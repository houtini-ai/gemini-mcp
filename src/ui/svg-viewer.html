<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemini SVG Viewer</title>
  <link rel="stylesheet" href="./svg-viewer.css" />
</head>
<body>
  <div id="loading">Waiting for SVG...</div>
  <div id="content">
    <div class="svg-wrap">
      <div id="panzoom-container"></div>
    </div>
    <div class="zoom-controls">
      <button class="zoom-btn" id="zoom-in" title="Zoom in">+</button>
      <span class="zoom-level" id="zoom-level">100%</span>
      <button class="zoom-btn" id="zoom-out" title="Zoom out">&minus;</button>
      <button class="zoom-btn" id="zoom-reset" title="Reset zoom" style="font-size:11px;">Fit</button>
    </div>
    <div class="meta">
      <div class="meta-row">
        <div id="path-display" class="path"></div>
        <button id="copy-btn" class="copy-btn" style="display:none">Copy path</button>
      </div>
      <div id="desc" class="desc" style="display:none"></div>
      <div id="prompt" class="prompt" style="display:none">
        <div class="prompt-label">Prompt</div>
        <div id="prompt-text"></div>
      </div>
    </div>
  </div>

  <script type="module" src="./svg-viewer.ts"></script>
</body>
</html>
